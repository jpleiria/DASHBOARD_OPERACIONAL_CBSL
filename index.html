<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operacional - CBSL</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #3b82f6;
            --accent-radio: #facc15;
            --accent-danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --editor-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 100;
            height: 60px;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .logos img { height: 38px; width: auto; }
        
        .clock-container {
            display: flex;
            align-items: baseline;
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 15px;
            border-radius: 6px;
            gap: 15px;
        }

        #clock-date { font-size: 0.95rem; color: var(--text-dim); text-transform: capitalize; }
        #clock-time { font-size: 1.6rem; color: #ffffff; font-weight: 800; font-family: 'Courier New', monospace; }

        .dashboard-container { 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 10px; 
            padding: 10px; 
            flex: 1; 
            overflow: hidden; 
        }

        .controls-panel { 
            background: var(--card-bg); 
            padding: 12px; 
            border-radius: 10px; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .category-group {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .category-title { color: var(--accent-primary); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; display: block; }

        .inline-volume { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .volume-slider { flex: 1; cursor: pointer; height: 6px; accent-color: var(--accent-primary); }
        .volume-pct { font-size: 0.8rem; min-width: 35px; text-align: right; }

        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        
        .btn-audio { 
            background: #334155; border: 1px solid #475569; color: white; padding: 8px 4px; border-radius: 6px; 
            cursor: pointer; font-size: 0.75rem; font-weight: 600; min-height: 45px; transition: all 0.2s;
        }

        .btn-mute-all { width: 100%; background: var(--accent-danger); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 800; cursor: pointer; margin-bottom: 5px; }
        
        .is-playing { animation: pulse-alert 0.8s infinite !important; border: 2px solid white !important; }

        .main-layout {
            display: grid;
            grid-template-rows: 1fr 180px;
            gap: 10px;
            height: 100%;
        }

        .top-priority-apps {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .notes-container {
            background: #e2e8f0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #334155;
        }

        .editor-toolbar {
            background: #cbd5e1;
            padding: 8px;
            display: flex;
            gap: 6px;
            align-items: center;
            border-bottom: 1px solid #94a3b8;
        }

        .editor-toolbar button, .editor-toolbar select, .editor-toolbar input {
            padding: 6px;
            cursor: pointer;
            border: 1px solid #94a3b8;
            background: white;
            border-radius: 4px;
            font-weight: bold;
            height: 35px;
            min-width: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-active {
            background: var(--accent-primary) !important;
            color: white !important;
            border-color: #1d4ed8 !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        #editor {
            flex: 1;
            padding: 20px;
            background: white;
            color: #1e293b;
            overflow-y: auto;
            outline: none;
            font-size: 24px;
            line-height: 1.4;
        }

        .btn-delete-all {
            background: #ef4444 !important;
            color: white !important;
            margin-left: auto !important;
            padding: 0 10px !important;
        }

        .shelly-credentials {
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 5px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            border-top: 1px solid #3b82f6;
            z-index: 21;
        }

        .shelly-credentials span { font-size: 0.85rem; font-weight: bold; }
        .shelly-credentials strong { color: var(--accent-radio); font-size: 0.9rem; }

        .minimized-apps-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .app-card { background: #fff; border-radius: 8px; overflow: hidden; position: relative; border: 2px solid #334155; }
        .app-card.maximized { position: fixed; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 9999; border-radius: 0; }

        .iframe-wrapper { width: 100%; height: 100%; overflow: hidden; position: relative; }
        .zoom-out-content { width: 125% !important; height: 125% !important; transform: scale(0.8); transform-origin: 0 0; }
        .app-card.maximized .zoom-out-content { width: 100% !important; height: 100% !important; transform: scale(1) !important; }

        .app-label { 
            position: absolute; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(15, 23, 42, 0.9); 
            color: white; 
            font-size: 0.65rem; 
            padding: 2px 5px; 
            text-align: center; 
            pointer-events: none; 
            z-index: 20; 
        }

        /* CONFIGURAÇÃO SOLICITADA: Ocultar legenda do Shelly por padrão */
        #card-shelly .app-label {
            display: none;
        }

        /* Mostrar legenda do Shelly apenas quando maximizado */
        #card-shelly.maximized .app-label {
            display: block;
        }

        /* Esconder legendas dos outros apps ao maximizar */
        .app-card.maximized:not(#card-shelly) .app-label {
            display: none;
        }

        .resize-btn { position: absolute; top: 5px; right: 5px; background: rgba(15, 23, 42, 0.8); color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 0.6rem; z-index: 30; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body onclick="iniciarAudioContext()">

<header>
    <div class="header-left">
        <div class="logos">
            <img src="leiria.png" alt="Leiria">
            <img src="logo.png" alt="Bombeiros">
        </div>
        <h2 style="margin-left: 10px; font-size: 1rem; color: var(--text-dim);">DASHBOARD OPERACIONAL - CBSL</h2>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
        <div id="silence-timer" style="color:var(--accent-radio); font-weight:bold; font-size: 0.9rem;"></div>
        <div class="clock-container">
            <span id="clock-date"></span>
            <span id="clock-time"></span>
        </div>
    </div>
</header>

<div class="dashboard-container">
    <aside class="controls-panel">
        <button class="btn-mute-all" onclick="stopAllAudios()">SILENCIAR TUDO</button>
        <div class="category-group">
            <span class="category-title">🚨 Operacional</span>
            <div class="inline-volume"><input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateSectionVolume('op', this.value)"><span class="volume-pct" id="txt-vol-op">50%</span></div>
            <div class="button-grid" id="grid-operacional"></div>
        </div>
        <div class="category-group">
            <span class="category-title">📞 Apoio</span>
            <div class="inline-volume"><input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateSectionVolume('ap', this.value)"><span class="volume-pct" id="txt-vol-ap">50%</span></div>
            <div class="button-grid" id="grid-apoio"></div>
        </div>
        <div class="category-group">
            <span class="category-title">📻 Rádios</span>
            <div class="inline-volume"><input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateSectionVolume('radio', this.value)"><span class="volume-pct" id="txt-vol-radio">50%</span></div>
            <div class="button-grid">
                <button class="btn-audio" id="btn-comercial" onclick="toggleRadio('comercial', 'https://stream-icy.bauermedia.pt/comercial.aac')">COMERCIAL</button>
                <button class="btn-audio" id="btn-rfm" onclick="toggleRadio('rfm', 'https://playerservices.streamtheworld.com/api/livestream-redirect/RFM_SC')">RFM</button>
            </div>
        </div>
    </aside>

    <main class="main-layout">
        <section class="top-priority-apps">
            <div class="app-card" id="card-shelly" style="display: flex; flex-direction: column;">
                <button class="resize-btn" onclick="toggleMaximize('card-shelly')">MAX</button>
                <div class="iframe-wrapper" style="flex: 1;"><iframe src="https://control.shelly.cloud/#/dash/-1" class="zoom-out-content"></iframe></div>
                <div class="shelly-credentials">
                    <span>Email: <strong>operadorbmlcmos@gmail.com</strong></span>
                    <span>Pass: <strong>opBMLcmos1002</strong></span>
                </div>
                <div class="app-label">SHELLY CLOUD</div>
            </div>

            <div class="notes-container">
                <div class="editor-toolbar">
                    <button id="btn-bold" onclick="execFormat('bold')" title="Negrito"><b>B</b></button>
                    <button id="btn-italic" onclick="execFormat('italic')" title="Itálico"><i>I</i></button>
                    <button id="btn-underline" onclick="execFormat('underline')" title="Sublinhado"><u>U</u></button>
                    <select onchange="execCmd('fontSize', this.value)">
                        <option value="4">Pequeno</option>
                        <option value="5" selected>Normal</option>
                        <option value="7">Grande</option>
                    </select>
                    <input type="color" onchange="execCmd('foreColor', this.value)" title="Cor">
                    <button class="btn-delete-all" onclick="confirmClearAll()">APAGAR TUDO</button>
                </div>
                <div id="editor" contenteditable="true" oninput="saveNotes()" onkeyup="checkStates()" onclick="checkStates()"></div>
                <div class="app-label" style="position:relative; background:#1e293b">NOTAS OPERACIONAIS</div>
            </div>
        </section>

        <section class="minimized-apps-bar">
            <div class="app-card" id="card-escala"><button class="resize-btn" onclick="toggleMaximize('card-escala')">MAX</button><iframe src="https://jpleiria.github.io/escala_servico/"></iframe><div class="app-label">ESCALA</div></div>
            <div class="app-card" id="card-coord"><button class="resize-btn" onclick="toggleMaximize('card-coord')">MAX</button><iframe src="https://jpleiria.github.io/conversor_coordenadas_siresp/"></iframe><div class="app-label">COORDENADAS</div></div>
            <div class="app-card" id="card-classif"><button class="resize-btn" onclick="toggleMaximize('card-classif')">MAX</button><iframe src="https://jpleiria.github.io/codigos_ocorrencias/"></iframe><div class="app-label">CÓD. OCORRÊNCIAS</div></div>
            <div class="app-card" id="card-ppi"><button class="resize-btn" onclick="toggleMaximize('card-ppi')">MAX</button><iframe src="https://jpleiria.github.io/ppi_autoestradas/"></iframe><div class="app-label">PPI</div></div>
            <div class="app-card" id="card-transito"><button class="resize-btn" onclick="toggleMaximize('card-transito')">MAX</button><div class="iframe-wrapper"><iframe src="https://jpleiria.github.io/transito_tempo_real/" class="zoom-out-content"></iframe></div><div class="app-label">TRÂNSITO</div></div>
        </section>
    </main>
</div>

<script>
    // --- EDITOR ---
    function execCmd(command, value = null) {
        document.execCommand(command, false, value);
        saveNotes();
    }
    function execFormat(cmd) {
        document.execCommand(cmd, false, null);
        checkStates();
        saveNotes();
    }
    function checkStates() {
        const states = { 'bold': 'btn-bold', 'italic': 'btn-italic', 'underline': 'btn-underline' };
        for (let cmd in states) {
            const btn = document.getElementById(states[cmd]);
            if (document.queryCommandState(cmd)) btn.classList.add('btn-active');
            else btn.classList.remove('btn-active');
        }
    }
    function saveNotes() { localStorage.setItem('cbsl_notes', document.getElementById('editor').innerHTML); }
    function loadNotes() {
        const saved = localStorage.getItem('cbsl_notes');
        if (saved) document.getElementById('editor').innerHTML = saved;
        else document.execCommand('fontSize', false, '5');
    }
    function confirmClearAll() {
        if (confirm("TEM A CERTEZA? Isto vai apagar todas as notas.")) {
            document.getElementById('editor').innerHTML = "";
            saveNotes();
            checkStates();
        }
    }

    // --- DASHBOARD ---
    const activeAudios = {};
    let sectionVolumes = { op: 0.5, ap: 0.5, radio: 0.5 };
    let lastActiveRadio = null;
    let audioCtx = null;
    let countdownInterval = null;

    const operacionais = [
        { id: 'emergencia_medica', label: 'E. Médica' }, { id: 'acidente_viacao', label: 'Acidente' },
        { id: 'incendio_urbano', label: 'I. Urbano' }, { id: 'incendio_industrial', label: 'I. Indust.' },
        { id: 'incendio_florestal', label: 'I. Flor.' }, { id: 'saída_anulada', label: 'Anulada' },
        { id: 'alerta', label: 'Alerta' }
    ];

    const apoios = [
        { id: 'chefe', label: 'Chefe' }, { id: 'rendição', label: 'Rendição' },
        { id: 'logistica', label: 'Logística' }, { id: 'parque_viaturas', label: 'Parque' },
        { id: 'troca_turno', label: 'Turno' }
    ];

    function init() {
        const gridOp = document.getElementById('grid-operacional');
        operacionais.forEach(item => gridOp.innerHTML += `<button class="btn-audio" id="btn-${item.id}" onclick="playAudio('${item.id}', 'op')">${item.label}</button>`);
        const gridAp = document.getElementById('grid-apoio');
        apoios.forEach(item => gridAp.innerHTML += `<button class="btn-audio" id="btn-${item.id}" onclick="playAudio('${item.id}', 'ap')">${item.label}</button>`);
        updateClock(); 
        setInterval(updateClock, 1000);
        loadNotes();
    }

    function toggleMaximize(cardId) {
        const card = document.getElementById(cardId);
        const btn = card.querySelector('.resize-btn');
        const iframe = card.querySelector('iframe');
        if (card.classList.contains('maximized')) {
            card.classList.remove('maximized');
            btn.innerText = 'MAX';
        } else {
            card.classList.add('maximized');
            btn.innerText = 'FECHAR';
            if(iframe && (cardId === 'card-transito' || cardId === 'card-shelly')) {
               const src = iframe.src; iframe.src = '';
               setTimeout(() => { iframe.src = src; }, 50);
            }
        }
    }

    function updateSectionVolume(section, value) {
        sectionVolumes[section] = parseFloat(value);
        document.getElementById(`txt-vol-${section}`).innerText = Math.round(value * 100) + '%';
        Object.keys(activeAudios).forEach(id => {
            if (section === 'radio' && (id === 'comercial' || id === 'rfm')) activeAudios[id].volume = sectionVolumes.radio;
            else if (section === 'op' && operacionais.find(o => o.id === id)) activeAudios[id].volume = sectionVolumes.op;
            else if (section === 'ap' && apoios.find(a => a.id === id)) activeAudios[id].volume = sectionVolumes.ap;
        });
    }

    function iniciarAudioContext() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playAudio(id, section) {
        iniciarAudioContext();
        const btn = document.getElementById('btn-' + id);
        if (activeAudios[id]) {
            activeAudios[id].pause();
            btn.classList.remove('is-playing');
            delete activeAudios[id];
            checkAndResumeRadio();
            return;
        }
        if (section === 'op' || id === 'troca_turno') {
            if (lastActiveRadio && activeAudios[lastActiveRadio.id]) activeAudios[lastActiveRadio.id].pause();
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('silence-timer').innerText = "";
        }
        const audio = new Audio(id + '.mp3');
        audio.volume = sectionVolumes[section];
        btn.classList.add('is-playing');
        audio.play().catch(e => console.log("Erro áudio:", id));
        activeAudios[id] = audio;
        audio.onended = () => {
            btn.classList.remove('is-playing');
            delete activeAudios[id];
            checkAndResumeRadio();
        };
    }

    function checkAndResumeRadio() {
        const prioritarios = Object.keys(activeAudios).filter(k => k !== 'comercial' && k !== 'rfm');
        if (prioritarios.length === 0 && lastActiveRadio) iniciarContagemRetoma();
    }

    function toggleRadio(id, url, autoResume = false) {
        iniciarAudioContext();
        const btn = document.getElementById('btn-' + id);
        if (activeAudios[id] && !autoResume) {
            activeAudios[id].pause();
            delete activeAudios[id]; lastActiveRadio = null;
            btn.style.background = "#334155"; btn.style.color = "white";
        } else {
            const outra = (id === 'comercial') ? 'rfm' : 'comercial';
            if (activeAudios[outra]) { activeAudios[outra].pause(); delete activeAudios[outra]; document.getElementById('btn-' + outra).style.background = "#334155"; }
            const radioAudio = new Audio(url);
            radioAudio.volume = sectionVolumes.radio;
            radioAudio.play().then(() => {
                activeAudios[id] = radioAudio; lastActiveRadio = {id, url};
                btn.style.background = "var(--accent-radio)"; btn.style.color = "black";
            });
        }
    }

    function stopAllAudios() {
        if (countdownInterval) clearInterval(countdownInterval);
        document.getElementById('silence-timer').innerText = "";
        Object.keys(activeAudios).forEach(id => { 
            activeAudios[id].pause();
            const btn = document.getElementById('btn-' + id);
            if (btn) btn.classList.remove('is-playing');
            if (id === 'comercial' || id === 'rfm') { btn.style.background = "#334155"; btn.style.color = "white"; }
            delete activeAudios[id];
        });
        lastActiveRadio = null;
    }

    function iniciarContagemRetoma() {
        if (!lastActiveRadio) return;
        let timeLeft = 60;
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('silence-timer').innerText = `RÁDIO EM: ${timeLeft}s`;
            if (timeLeft <= 0) { clearInterval(countdownInterval); document.getElementById('silence-timer').innerText = ""; toggleRadio(lastActiveRadio.id, lastActiveRadio.url, true); }
        }, 1000);
    }

    function updateClock() {
        const agora = new Date();
        const h = agora.getHours(); const m = agora.getMinutes(); const s = agora.getSeconds();
        if ((h === 8 || h === 20) && m === 0 && s === 0) playAudio('troca_turno', 'ap');
        const dias = ['domingo', 'segunda', 'terça', 'quarta', 'quinta', 'sexta', 'sábado'];
        const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        document.getElementById('clock-date').innerText = `${dias[agora.getDay()]}, ${agora.getDate()} ${meses[agora.getMonth()]} ${agora.getFullYear()}`;
        document.getElementById('clock-time').innerText = agora.toLocaleTimeString('pt-PT', { hour12: false });
    }

    init();
</script>
</body>
</html>
