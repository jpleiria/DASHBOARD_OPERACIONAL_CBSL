<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operacional - CBSL</title>
    <style>
        /* ============================================================
           VARIÁVEIS GLOBAIS
           Todas as dimensões usam clamp(mínimo, preferido, máximo)
           para se adaptarem suavemente entre resoluções.
        ============================================================ */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #3b82f6;
            --accent-radio: #facc15;
            --accent-danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;

            /* Escala base usada para derivar proporções — ajusta-se via media queries */
            --header-h:        clamp(52px,  6vh,   88px);
            --logo-h:          clamp(32px,  4.2vh, 62px);
            --gap-base:        clamp(5px,   0.6vw, 10px);
            --pad-base:        clamp(6px,   0.7vw, 12px);
            --radius-base:     8px;

            /* Tipografia fluida */
            --fs-clock-time:   clamp(1.3rem, 2.2vw, 2.4rem);
            --fs-clock-date:   clamp(0.75rem, 1vw,  1.15rem);
            --fs-title:        clamp(0.85rem, 1.3vw, 1.65rem);
            --fs-btn-audio:    clamp(0.65rem, 0.85vw, 0.9rem);
            --fs-category:     clamp(0.6rem,  0.7vw, 0.75rem);
            --fs-small:        clamp(0.6rem,  0.7vw, 0.8rem);
            --fs-editor:       clamp(14px, 1.4vw, 22px);
            --fs-app-desc:     clamp(10px, 1.1vw, 14px);

            /* Alturas dos painéis */
            --controls-h:      clamp(28%, 33%, 38%);
            --top-apps-h:      clamp(44%, 50%, 55%);
            --info-h:          clamp(120px, 15vh, 280px);
            --btn-audio-minh:  clamp(60px, 7.5vh, 95px);
        }

        /* ============================================================
           RESET & BODY
        ============================================================ */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            /* dvh garante altura correta em browsers mobile com barra de endereço */
            height: 100dvh;
            overflow: hidden;
        }

        /* ============================================================
           HEADER
        ============================================================ */
        header {
            padding: 0 clamp(10px, 1.5vw, 24px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 100;
            height: var(--header-h);
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: clamp(8px, 1.2vw, 18px); }

        .logos img {
            height: var(--logo-h);
            width: auto;
        }

        .header-left h2 {
            font-size: var(--fs-title) !important;
            color: var(--text-dim);
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: clamp(160px, 28vw, 600px);
        }

        .clock-container {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: clamp(6px, 0.8vh, 12px) clamp(10px, 1vw, 18px);
            border-radius: var(--radius-base);
            gap: clamp(10px, 1.5vw, 24px);
        }

        #clock-date {
            font-size: var(--fs-clock-date);
            color: var(--text-dim);
            text-transform: capitalize;
            font-weight: 500;
        }
        #clock-time {
            font-size: var(--fs-clock-time);
            color: #ffffff;
            font-weight: 800;
            font-family: 'Courier New', monospace;
        }

        /* ============================================================
           DASHBOARD PRINCIPAL
        ============================================================ */
        .dashboard-container {
            display: flex;
            flex-direction: column;
            gap: var(--gap-base);
            padding: var(--gap-base);
            flex: 1;
            overflow: hidden;
        }

        /* ============================================================
           PAINEL DE CONTROLO (áudio)
        ============================================================ */
        .controls-panel {
            background: var(--card-bg);
            padding: var(--pad-base);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: clamp(3px, 0.4vh, 6px);
            height: var(--controls-h);
            overflow-y: auto;
            flex-shrink: 0;
        }

        .category-group {
            background: rgba(255, 255, 255, 0.02);
            padding: clamp(5px, 0.6vw, 10px);
            border-radius: var(--radius-base);
            border: 1px solid #334155;
            margin-bottom: 3px;
        }

        .category-title {
            color: var(--accent-primary);
            font-size: var(--fs-category);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
            display: block;
        }

        .inline-volume { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .volume-slider { flex: 1; cursor: pointer; height: 6px; accent-color: var(--accent-primary); }
        .volume-pct { font-size: var(--fs-small); min-width: 35px; text-align: right; }

        /* Grid de botões: 4 colunas no geral, adapta em ecrãs muito estreitos */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(5px, 0.7vw, 12px);
        }

        .btn-audio {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: clamp(6px, 0.7vh, 12px) 4px;
            border-radius: 6px;
            cursor: pointer;
            font-size: var(--fs-btn-audio);
            font-weight: 800;
            min-height: var(--btn-audio-minh);
            transition: all 0.2s;
            line-height: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-mute-all {
            width: 100%;
            background: var(--accent-danger);
            color: white;
            border: none;
            padding: clamp(5px, 0.6vh, 10px);
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 3px;
            font-size: var(--fs-btn-audio);
        }

        .is-playing { animation: pulse-alert 0.8s infinite !important; border: 2px solid white !important; }

        @keyframes pulse-alert {
            0%   { background-color: var(--accent-danger); }
            50%  { background-color: #b91c1c; }
            100% { background-color: var(--accent-danger); }
        }

        /* ============================================================
           LAYOUT PRINCIPAL
        ============================================================ */
        .main-layout {
            display: flex;
            flex-direction: column;
            gap: var(--gap-base);
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Apps prioritárias (Shelly + Escala) */
        .top-priority-apps {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap-base);
            height: var(--top-apps-h);
            flex-shrink: 0;
        }

        .app-container-full {
            background: #000;
            border-radius: var(--radius-base);
            overflow: hidden;
            border: 2px solid #334155;
            height: 100%;
            position: relative;
        }

        #card-shelly iframe {
            width: 80%;
            height: 80%;
            transform: scale(1.25);
            transform-origin: 0 0;
            border: none;
            display: block;
            background: white;
        }

        #card-escala iframe { width: 100%; height: 100%; border: none; display: block; background: white; }

        /* Credenciais Shelly */
        #shelly-credentials {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.98);
            padding: 12px;
            border-radius: var(--radius-base);
            border: 2px solid var(--accent-radio);
            z-index: 5002;
            flex-direction: column;
            gap: 8px;
        }

        #card-shelly.maximized #shelly-credentials { display: flex; }

        .cred-row { display: flex; align-items: center; gap: 8px; background: #000; padding: 6px 10px; border-radius: 4px; border: 1px solid #334155; }
        .cred-row input { background: transparent; border: none; color: white; font-family: monospace; font-size: 0.9rem; width: clamp(140px, 18vw, 220px); outline: none; }
        .copy-btn { background: var(--accent-primary); border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; white-space: nowrap; }

        /* Secção de informações / avisos */
        .info-estatica-container {
            background: var(--card-bg);
            border: 2px solid #334155;
            border-radius: var(--radius-base);
            padding: var(--pad-base);
            height: var(--info-h);
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* Zona inferior: mini-apps + notas */
        .bottom-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap-base);
            flex: 1;
            min-height: 0;
        }

        .cards-grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: var(--gap-base);
        }

        /* Bloco de notas */
        .notes-container {
            background: #e2e8f0;
            border-radius: var(--radius-base);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #334155;
        }

        .notes-toolbar {
            background: #1e293b;
            padding: clamp(3px, 0.4vh, 7px);
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 2px solid #334155;
        }

        .toolbar-btn {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: var(--fs-small);
        }
        .toolbar-btn.btn-delete { background: var(--accent-danger); margin-left: auto; font-weight: bold; }
        .toolbar-btn.active { background: var(--accent-primary); }

        #editor {
            flex: 1;
            padding: 10px;
            background: white;
            color: #1e293b;
            overflow-y: auto;
            outline: none;
            font-size: var(--fs-editor);
        }

        /* Mini-cards de apps */
        .app-card {
            background: var(--card-bg);
            border-radius: var(--radius-base);
            overflow: hidden;
            position: relative;
            border: 2px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
        }
        .app-card .app-icon  { font-size: clamp(1rem, 1.4vw, 1.5rem); }
        .app-card .app-desc  { font-size: var(--fs-app-desc); font-weight: bold; text-transform: uppercase; margin-top: 4px; line-height: 1.1; }
        .app-card iframe     { display: none; }

        /* Estado maximizado */
        .maximized { position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; z-index: 5000 !important; border-radius: var(--radius-base) !important; border: 3px solid var(--accent-primary) !important; background: black !important; }
        .maximized iframe { display: block !important; width: 100% !important; height: 100% !important; border: none; transform: none !important; }

        .close-btn-max {
            display: none;
            position: absolute;
            top: clamp(8px, 1.2vh, 18px);
            right: clamp(8px, 1.2vw, 18px);
            background: var(--accent-danger);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            padding: clamp(5px, 0.6vh, 10px) clamp(10px, 1.2vw, 18px);
            cursor: pointer;
            font-size: clamp(0.75rem, 0.9vw, 1rem);
            font-weight: 800;
            z-index: 5001;
        }
        .maximized .close-btn-max { display: block; }

        .resize-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            border: 1px solid var(--accent-primary);
            border-radius: 4px;
            padding: 2px 6px;
            cursor: pointer;
            font-size: clamp(0.5rem, 0.6vw, 0.65rem);
            z-index: 50;
        }

        #silence-timer {
            color: var(--accent-radio);
            font-weight: bold;
            font-size: clamp(0.7rem, 0.9vw, 0.95rem);
            margin-right: clamp(8px, 1.2vw, 18px);
        }

        /* ============================================================
           MEDIA QUERIES — ajustes pontuais por resolução

           Os clamp() já fazem a maior parte do trabalho.
           Aqui apenas afinamos valores que a função linear não cobre bem.
        ============================================================ */

        /* Ecrãs pequenos (portáteis / tablets landscape ≤ 1280px) */
        @media (max-width: 1280px) {
            :root {
                --controls-h: clamp(30%, 35%, 40%);
                --top-apps-h: clamp(42%, 48%, 52%);
                --info-h:     clamp(100px, 13vh, 200px);
            }
            /* Em ecrãs mais estreitos, 3 colunas no grid de botões de áudio */
            .button-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            /* Ocultar data para poupar espaço no header */
            #clock-date { display: none; }
        }

        /* Ecrãs médios — Full HD (1920 × 1080) */
        @media (min-width: 1281px) and (max-width: 1920px) {
            /* Os valores clamp() já cobrem bem este intervalo. */
        }

        /* Ecrãs grandes — WQHD / 2K (1921 – 2560px) */
        @media (min-width: 1921px) and (max-width: 2560px) {
            :root {
                --btn-audio-minh: clamp(85px, 8vh, 110px);
                --info-h:         clamp(200px, 18vh, 340px);
            }
        }

        /* Ecrãs muito grandes — 4K (> 2560px) */
        @media (min-width: 2561px) {
            :root {
                --header-h:       clamp(80px, 5.5vh, 120px);
                --logo-h:         clamp(55px, 4vh,  90px);
                --btn-audio-minh: clamp(100px, 9vh, 130px);
                --info-h:         clamp(240px, 16vh, 420px);
                --gap-base:       clamp(8px, 0.5vw, 16px);
            }
            .button-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: clamp(8px, 0.6vw, 18px);
            }
        }

        /* Ecrãs muito estreitos (≤ 900px) — tablet portrait */
        @media (max-width: 900px) {
            .top-priority-apps  { grid-template-columns: 1fr; height: auto; max-height: 45vh; }
            .bottom-split       { grid-template-columns: 1fr; }
            .button-grid        { grid-template-columns: repeat(2, 1fr); }
            .cards-grid-3x3     { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
            .header-left h2     { display: none; }  /* Título demasiado longo em mobile */
        }
    </style>
</head>
<body onclick="iniciarAudioContext()">

<header>

        <h2>DASHBOARD OPERACIONAL - CBSL</h2>

    <div id="alerta-troca-turno" style="display: none; color: var(--accent-radio); font-weight: 800; font-size: 1.6rem; animation: pulse-alert 1s infinite; background: rgba(250, 204, 21, 0.1); padding: 5px 15px; border-radius: 4px; border: 1px solid var(--accent-radio);">
        ⚠️ TROCA DE TURNO ⚠️
    </div>
    <div style="display: flex; align-items: center;">
        <div id="silence-timer"></div>
        <div class="clock-container"><span id="clock-date"></span><span id="clock-time"></span></div>
    </div>
</header>

<div class="dashboard-container">
    <aside class="controls-panel">
        <button class="btn-mute-all" onclick="stopAllAudios()">SILENCIAR TUDO</button>
        <div class="category-group">
            <span class="category-title">🚨 Operacional</span>
            <div class="inline-volume">
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1" oninput="updateSectionVolume('op', this.value)">
                <span class="volume-pct" id="txt-vol-op">100%</span>
            </div>
            <div class="button-grid" id="grid-operacional"></div>
        </div>
        <div class="category-group">
            <span class="category-title">Apoio</span>
            <div class="inline-volume">
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1" oninput="updateSectionVolume('ap', this.value)">
                <span class="volume-pct" id="txt-vol-ap">100%</span>
            </div>
            <div class="button-grid" id="grid-apoio"></div>
        </div>
        <div class="category-group">
            <span class="category-title">📻 Rádios</span>
            <div class="inline-volume">
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateSectionVolume('radio', this.value)">
                <span class="volume-pct" id="txt-vol-radio">50%</span>
            </div>
            <div class="button-grid">
                <button class="btn-audio" id="btn-comercial" onclick="toggleRadio('comercial', 'https://stream-icy.bauermedia.pt/comercial.aac')">COMERCIAL</button>
                <button class="btn-audio" id="btn-rfm" onclick="toggleRadio('rfm', 'https://playerservices.streamtheworld.com/api/livestream-redirect/RFM_SC')">RFM</button>
            </div>
        </div>
    </aside>

    <main class="main-layout">
        <section class="top-priority-apps">
            <div class="app-container-full" id="card-shelly" onclick="handleCardClick(event, 'card-shelly')">
                <button class="resize-btn">ABRIR</button>
                <button class="close-btn-max" onclick="toggleMaximize('card-shelly', event)">VOLTAR</button>
                
                <div id="shelly-credentials" onclick="event.stopPropagation()">
                    <div class="cred-row">
                        <input type="text" value="operadorbmlcmos@gmail.com" id="sh-e" readonly>
                        <button class="copy-btn" onclick="copyText('sh-e')">COPIAR EMAIL</button>
                    </div>
                    <div class="cred-row">
                        <input type="text" value="opBMLcmos1002" id="sh-p" readonly>
                        <button class="copy-btn" onclick="copyText('sh-p')">COPIAR PASS</button>
                    </div>
                </div>
                <iframe src="https://control.shelly.cloud/#/dash/-1"></iframe>
            </div>

            <div class="app-container-full" id="card-escala" onclick="handleCardClick(event, 'card-escala')">
                <button class="close-btn-max" onclick="toggleMaximize('card-escala', event)">VOLTAR</button>
                <iframe src="https://jpleiria.github.io/escala_servico/"></iframe>
            </div>
        </section>

        <section class="info-estatica-container">
            <span class="info-estatica-title" style="color:var(--accent-radio); font-weight:bold; font-size:0.75rem; border-bottom:1px solid #334155; display:block; margin-bottom:5px;">Informações / Avisos</span>
            <div id="conteudo-estatico" class="info-estatica-content" style="font-size:1.2rem; color:var(--text-main); line-height:1.4;">
                A carregar informações da Folha de Cálculo...
            </div>
        </section>

        <div class="bottom-split">
            <section class="cards-grid-3x3">
                <div class="app-card" id="card-coord" onclick="toggleMaximize('card-coord')">
                    <button class="close-btn-max">VOLTAR</button>
                    <div class="app-icon">📍</div><div class="app-desc">CONVERSOR<br>COORDENADAS</div>
                    <iframe data-src="https://jpleiria.github.io/conversor_coordenadas_siresp/"></iframe>
                </div>
                <div class="app-card" id="card-classif" onclick="toggleMaximize('card-classif')">
                    <button class="close-btn-max">VOLTAR</button>
                    <div class="app-icon">🔢</div><div class="app-desc">CLASSIFICAÇÃO<br>OCORRÊNCIAS</div>
                    <iframe data-src="https://jpleiria.github.io/codigos_ocorrencias/"></iframe>
                </div>
                <div class="app-card" id="card-ppi" onclick="toggleMaximize('card-ppi')">
                    <button class="close-btn-max">VOLTAR</button>
                    <div class="app-icon">🛣️</div><div class="app-desc">PPI<br>AUTOESTRADAS</div>
                    <iframe data-src="https://jpleiria.github.io/ppi_autoestradas/"></iframe>
                </div>
                <div class="app-card" id="card-transito" onclick="toggleMaximize('card-transito')">
                    <button class="close-btn-max">VOLTAR</button>
                    <div class="app-icon">🚗</div><div class="app-desc">TRÂNSITO<br>LIVE</div>
                    <iframe data-src="https://jpleiria.github.io/transito_tempo_real/"></iframe>
                </div>
                <div class="app-card" id="card-blackline" onclick="window.open('https://eu.live.blacklinesafety.com/sign-in', '_blank')">
    <div class="app-icon">🛡️</div><div class="app-desc">APARELHOS DETEÇÃO<br>MULTIGÁS</div>
</div>
                <div class="app-card" style="border-style: dashed; opacity: 0.3; cursor: default;">
                    <div class="app-desc">LIVRE</div>
                </div>
            </section>

            <section class="notes-container">
    <div class="notes-toolbar">
        <button class="toolbar-btn" id="btn-bold" onclick="execCmd('bold')" style="width: 40px; font-size: 1rem;"><b>B</b></button>
        <input type="color" onchange="execCmd('foreColor', this.value)" title="Cor da Fonte" style="width:30px; height:24px; border:none; padding:0; background:none; cursor:pointer;">
        <button class="toolbar-btn btn-delete" onclick="clearNotes()">APAGAR TUDO</button>
    </div>
    <div id="editor" contenteditable="true" oninput="saveNotes()" onkeyup="updateToolbar()" onclick="updateToolbar()"></div>
</section>
        </div>
    </main>
</div>

<script>
    const activeAudios = {};
    let sectionVolumes = { op: 1.0, ap: 1.0, radio: 0.5 };
    let lastActiveRadio = null; 
    let countdownInterval = null;

    async function carregarInfoGoogle() {
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSxSKqdt8O2nHhGdhbPkoG4z9yNnNNAolaHAqGn3Vn4wdgICPEJ3PKTxY-Ra8mYahwSjKHGCfFVjcb/pub?gid=0&single=true&output=csv'; 
        try {
            const resposta = await fetch(url + '&t=' + new Date().getTime());
            if (!resposta.ok) throw new Error('Falha na resposta');
            const texto = await resposta.text();
            const linhas = texto.split(/\r?\n/);
            const htmlFinal = linhas
                .map(linha => linha.replace(/^"|"$/g, '').trim()) 
                .filter(linha => linha !== "")
                .map(linha => `• ${linha}<br>`)
                .join('');
            document.getElementById('conteudo-estatico').innerHTML = htmlFinal || "Nenhuma informação/aviso disponível.";
        } catch (erro) {
            console.error("Erro ao carregar dados do Google:", erro);
            document.getElementById('conteudo-estatico').innerHTML = "<span style='color:red;'>Erro ao carregar avisos da nuvem. Verifique a ligação.</span>";
        }
    }

    // Função genérica para Negrito e outras funções simples
function execCmd(c, v=null) { 
    document.execCommand(c, false, v); 
    updateToolbar(); 
    saveNotes(); 
}

// Nova função específica para o Tamanho da Fonte
function alterarTamanhoFonte(tamanho) {
    const selecao = window.getSelection();
    if (!selecao.rangeCount) return;

    // 1. Ativa o uso de CSS em vez de tags <font>
    document.execCommand('styleWithCSS', false, true);
    
    // 2. Aplica o comando de tamanho (o valor "7" é apenas um gatilho)
    document.execCommand('fontSize', false, "7");
    
    // 3. Substitui o que o browser criou pelo tamanho real em pixels
    const spans = document.getElementById('editor').querySelectorAll('span');
    spans.forEach(span => {
        if (span.style.fontSize === 'xxx-large' || span.getAttribute('size') === '7') {
            span.removeAttribute('size');
            span.style.fontSize = tamanho;
        }
    });

    saveNotes();
}
    function updateToolbar() { const isBold = document.queryCommandState('bold'); document.getElementById('btn-bold').classList.toggle('active', isBold); }
    function clearNotes() { if(confirm("Apagar todas as notas?")) { document.getElementById('editor').innerHTML = ""; saveNotes(); } }
    function copyText(id) { const el = document.getElementById(id); el.select(); document.execCommand('copy'); const btn = el.nextElementSibling; btn.innerText = "COPIADO!"; btn.style.background = "#10b981"; setTimeout(() => { btn.innerText = "COPIAR"; btn.style.background = "var(--accent-primary)"; }, 2000); }
    function handleCardClick(e, id) { const card = document.getElementById(id); if (!card.classList.contains('maximized')) toggleMaximize(id, e); }

    function toggleMaximize(id, e) {
        if(e) e.stopPropagation();
        const card = document.getElementById(id);
        const iframe = card.querySelector('iframe');
        if (card.classList.contains('maximized')) {
            card.classList.remove('maximized');
        } else {
            document.querySelectorAll('.app-card, .app-container-full').forEach(c => c.classList.remove('maximized'));
            if(iframe && iframe.dataset.src) { iframe.src = iframe.dataset.src; delete iframe.dataset.src; }
            card.classList.add('maximized');
        }
    }

    const operacionais = [
        { id: 'emergencia_medica', label: '*️⃣<br>EMERGÊNCIA MÉDICA' }, 
        { id: 'acidente_viacao', label: '🚧<br>ACIDENTE' },
        { id: 'incendio_urbano', label: '🚒<br>INCÊNDIO URBANO' }, 
        { id: 'incendio_industrial', label: '🚒<br>INCÊNDIO INDUSTRIAL' },
        { id: 'incendio_florestal', label: '🔥<br>INCÊNDIO FLORESTAL' }, 
        { id: 'saída_anulada', label: '❌<br>SAÍDA ANULADA' }, 
        { id: 'alerta', label: '🚨<br>ALERTA' }
    ];
    const apoios = [
        { id: 'chefe', label: 'CHEFE SERVIÇO À CENTRAL' }, { id: 'rendição', label: 'RENDIÇÃO À CENTRAL' },
        { id: 'logistica', label: 'LOGÍSTICA PRONTA' }, { id: 'parque_viaturas', label: 'TODOS OS ELEMENTOS AO PARQUE VIATURAS' }
    ];

    window.onload = () => {
        operacionais.forEach(i => document.getElementById('grid-operacional').innerHTML += `<button class="btn-audio" id="btn-${i.id}" onclick="playAudio('${i.id}', 'op')">${i.label}</button>`);
        apoios.forEach(i => document.getElementById('grid-apoio').innerHTML += `<button class="btn-audio" id="btn-${i.id}" onclick="playAudio('${i.id}', 'ap')">${i.label}</button>`);
        updateClock(); setInterval(updateClock, 1000); loadNotes();
        carregarInfoGoogle();
        setInterval(carregarInfoGoogle, 300000); 
    };

    function playAudio(id, section) {
    const btn = document.getElementById('btn-' + id);
    
    if (activeAudios[id]) { 
        activeAudios[id].pause(); 
        delete activeAudios[id]; 
        btn.classList.remove('is-playing'); 
        checkAndResumeRadio(); 
        return; 
    }

    if (section === 'op' || section === 'ap') {
        pauseCurrentRadios();
        if (countdownInterval) clearInterval(countdownInterval);
        document.getElementById('silence-timer').innerText = "";
    }

    // Lógica para Alerta Noturno (00h às 07h)
    const agora = new Date();
    const hora = agora.getHours();
    
    // Se for operacional E estiver entre as 00:00:00 e as 06:59:59
    if (section === 'op' && (hora >= 0 && hora < 7)) {
        const audioNoturno = new Audio('alerta_noturno.mp3');
        audioNoturno.volume = sectionVolumes[section];
        btn.classList.add('is-playing');
        
        // Toca o alerta noturno primeiro
        audioNoturno.play();
        activeAudios['noturno_temp'] = audioNoturno;

        audioNoturno.onended = () => {
            delete activeAudios['noturno_temp'];
            // Após o fim do noturno, inicia o operacional real
            iniciarReproducaoReal(id, section, btn);
        };
    } else {
        // Horário normal: toca imediatamente
        iniciarReproducaoReal(id, section, btn);
    }
}

// Função auxiliar para evitar repetição de código
function iniciarReproducaoReal(id, section, btn) {
    const audio = new Audio(id + '.mp3');
    audio.volume = sectionVolumes[section];
    if (!btn.classList.contains('is-playing')) btn.classList.add('is-playing');
    
    audio.play();
    activeAudios[id] = audio;

    audio.onended = () => {
        btn.classList.remove('is-playing');
        delete activeAudios[id];
        checkAndResumeRadio();
    };
}

    function pauseCurrentRadios() {
        ['comercial', 'rfm'].forEach(radioId => {
            if (activeAudios[radioId]) {
                activeAudios[radioId].pause();
                // Mantemos o lastActiveRadio guardado, mas removemos do activeAudios para o sistema saber que não está a tocar
                delete activeAudios[radioId];
                document.getElementById('btn-' + radioId).style.background = "#334155";
            }
        });
    }

    function toggleRadio(id, url) {
        const btn = document.getElementById('btn-' + id);
        if (activeAudios[id]) {
            activeAudios[id].pause();
            delete activeAudios[id];
            lastActiveRadio = null; 
            btn.style.background = "#334155";
        } else {
            // Se houver outra rádio, para-a
            const outra = id === 'comercial' ? 'rfm' : 'comercial';
            if (activeAudios[outra]) {
                activeAudios[outra].pause();
                delete activeAudios[outra];
                document.getElementById('btn-' + outra).style.background = "#334155";
            }
            
            const audio = new Audio(url);
            audio.volume = sectionVolumes.radio;
            audio.play();
            activeAudios[id] = audio;
            lastActiveRadio = {id, url}; // Memoriza qual rádio estava ativa
            btn.style.background = "var(--accent-radio)";
        }
    }

    function checkAndResumeRadio() {
        // Verifica se ainda existem alertas ativos (excluindo rádios)
        const alertasAtivos = Object.keys(activeAudios).filter(k => k !== 'comercial' && k !== 'rfm');
        
        if (alertasAtivos.length === 0 && lastActiveRadio) {
            let timeLeft = 60;
            if (countdownInterval) clearInterval(countdownInterval);
            
            document.getElementById('silence-timer').innerText = `RÁDIO EM: ${timeLeft}s`;
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('silence-timer').innerText = `RÁDIO EM: ${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('silence-timer').innerText = "";
                    // Volta a tocar a rádio memorizada
                    toggleRadio(lastActiveRadio.id, lastActiveRadio.url);
                }
            }, 1000);
        }
    }

    function stopAllAudios() {
        if (countdownInterval) clearInterval(countdownInterval);
        document.getElementById('silence-timer').innerText = "";
        document.getElementById('alerta-troca-turno').style.display = 'none';
        Object.keys(activeAudios).forEach(id => {
            activeAudios[id].pause();
            delete activeAudios[id];
        });
        document.querySelectorAll('.btn-audio').forEach(b => {
            b.classList.remove('is-playing');
            if(b.id === 'btn-comercial' || b.id === 'btn-rfm') b.style.background = "#334155";
        });
        lastActiveRadio = null;
    }

    function updateSectionVolume(s, v) { 
        sectionVolumes[s] = v; 
        document.getElementById('txt-vol-'+s).innerText = Math.round(v*100)+'%';
        // Atualiza volume em tempo real se rádio estiver a tocar
        if((s === 'radio') && activeAudios['comercial']) activeAudios['comercial'].volume = v;
        if((s === 'radio') && activeAudios['rfm']) activeAudios['rfm'].volume = v;
    }

    function saveNotes() { localStorage.setItem('cbsl_notes_v', document.getElementById('editor').innerHTML); }
    function loadNotes() { document.getElementById('editor').innerHTML = localStorage.getItem('cbsl_notes_v') || ''; }

// Variável para evitar que o áudio toque múltiplas vezes no mesmo segundo
let tocandoTrocaTurno = false;

function verificarTrocaTurno(horas, minutos, segundos) {
    const horarioMatinal = (horas === 8 && minutos === 0 && segundos === 0);
    const horarioNoturno = (horas === 20 && minutos === 0 && segundos === 0);

    if ((horarioMatinal || horarioNoturno) && !tocandoTrocaTurno) {
        tocarAudioTrocaTurno();
        tocandoTrocaTurno = true;
        
        // Reset da trava após 2 segundos para permitir o próximo ciclo
        setTimeout(() => { tocandoTrocaTurno = false; }, 2000);
    }
}

function tocarAudioTrocaTurno() {
    pauseCurrentRadios();
    if (countdownInterval) clearInterval(countdownInterval);
    document.getElementById('silence-timer').innerText = "";

    // Mostrar o alerta visual no topo
    const visualAlert = document.getElementById('alerta-troca-turno');
    if (visualAlert) visualAlert.style.display = 'block';

    const audio = new Audio('troca_turno.mp3');
    audio.volume = sectionVolumes.ap;
    activeAudios['troca_turno'] = audio; 
    
    audio.play().catch(e => console.error("Erro ao tocar áudio: ", e));
    
    audio.onended = () => {
        // Esconder o alerta visual quando o som terminar
        if (visualAlert) visualAlert.style.display = 'none';
        
        delete activeAudios['troca_turno'];
        checkAndResumeRadio();
    };
}    
    function updateClock() {
    const d = new Date();
    const h = d.getHours();
    const m = d.getMinutes();
    const s = d.getSeconds();

    // Chamada para a nova função de troca de turno
    verificarTrocaTurno(h, m, s);

    const optionsDate = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    let dateStr = d.toLocaleDateString('pt-PT', optionsDate);
    dateStr = dateStr.replace(/ de /g, ' ');
    
    document.getElementById('clock-date').innerText = dateStr;
    document.getElementById('clock-time').innerText = d.toLocaleTimeString('pt-PT', {hour12:false});
}
