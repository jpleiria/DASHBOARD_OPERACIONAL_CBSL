<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operacional - CBSL</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #3b82f6;
            --accent-radio: #facc15;
            --accent-danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 100;
            height: 60px;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .logos img { height: 38px; width: auto; }
        
        .clock-container {
            display: flex;
            align-items: baseline;
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 15px;
            border-radius: 6px;
            gap: 15px;
        }

        #clock-date { font-size: 0.95rem; color: var(--text-dim); text-transform: capitalize; }
        #clock-time { font-size: 1.6rem; color: #ffffff; font-weight: 800; font-family: 'Courier New', monospace; }

        .dashboard-container { 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 10px; 
            padding: 10px; 
            flex: 1; 
            overflow: hidden; 
        }

        .controls-panel { 
            background: var(--card-bg); 
            padding: 12px; 
            border-radius: 10px; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .category-group {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-bottom: 5px;
        }

        .category-title { color: var(--accent-primary); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; display: block; }

        .inline-volume { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .volume-slider { flex: 1; cursor: pointer; height: 6px; accent-color: var(--accent-primary); }
        .volume-pct { font-size: 0.8rem; min-width: 35px; text-align: right; }

        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        
        .btn-audio { 
            background: #334155; border: 1px solid #475569; color: white; padding: 8px 4px; border-radius: 6px; 
            cursor: pointer; font-size: 0.75rem; font-weight: 600; min-height: 45px; transition: all 0.2s;
        }

        .btn-mute-all { width: 100%; background: var(--accent-danger); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 800; cursor: pointer; margin-bottom: 5px; }
        .is-playing { animation: pulse-alert 0.8s infinite !important; border: 2px solid white !important; }

        @keyframes pulse-alert {
            0% { background-color: var(--accent-danger); }
            50% { background-color: #b91c1c; }
            100% { background-color: var(--accent-danger); }
        }

        .main-layout {
            display: grid;
            grid-template-rows: 1fr 150px;
            gap: 10px;
            height: 100%;
        }

        .top-priority-apps {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .notes-container {
            background: #e2e8f0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #334155;
        }

        .editor-toolbar {
            background: #cbd5e1;
            padding: 8px;
            display: flex;
            gap: 6px;
            align-items: center;
            border-bottom: 1px solid #94a3b8;
        }

        .editor-toolbar button, .editor-toolbar select, .editor-toolbar input {
            padding: 6px; cursor: pointer; border: 1px solid #94a3b8; background: white; border-radius: 4px; font-weight: bold; height: 32px;
        }

        .btn-active { background: var(--accent-primary) !important; color: white !important; }

        #editor {
            flex: 1; padding: 20px; background: white; color: #1e293b; overflow-y: auto; outline: none; font-size: 24px; line-height: 1.4;
        }

        #card-shelly { background: #000; position: relative; }
        .shelly-credentials {
            background: rgba(15, 23, 42, 0.95); color: white; padding: 5px 10px; display: none;
            flex-direction: column; align-items: center; font-family: monospace; border-top: 1px solid #3b82f6; z-index: 21;
        }
        #card-shelly.maximized .shelly-credentials { display: flex; }

        .iframe-container { width: 100%; height: 100%; overflow: hidden; position: relative; flex: 1; }
        #card-shelly iframe {
            width: 90.9%; height: 90.9%; transform: scale(1.1); transform-origin: 0 0; border: none; background: white;
        }
        #card-shelly.maximized iframe { width: 100%; height: 100%; transform: scale(1); }

        .minimized-apps-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }

        .app-card { 
            background: var(--card-bg); border-radius: 8px; overflow: hidden; position: relative; 
            border: 2px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
            text-align: center;
        }

        .app-card-iconic .app-icon { font-size: 1.8rem; margin-bottom: 5px; }
        .app-card-iconic .app-desc { font-size: 0.75rem; font-weight: bold; line-height: 1.2; text-transform: uppercase; }
        .app-card-iconic iframe { display: none; }

        /* Esconde o botão visualmente na barra inferior */
        .minimized-apps-bar .resize-btn { display: none; }

        .maximized { 
            position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; 
            height: 100vh !important; z-index: 9999 !important; border-radius: 0 !important;
        }
        
        .maximized iframe { display: block !important; width: 100% !important; height: 100% !important; transform: scale(1) !important; }
        .maximized .app-icon, .maximized .app-desc, .maximized .app-label { display: none !important; }

        .resize-btn { 
            position: absolute; top: 5px; right: 5px; background: rgba(15, 23, 42, 0.8); 
            color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 0.6rem; z-index: 30; 
            pointer-events: none;
        }

        .app-card.maximized .resize-btn { 
            display: block !important;
            background: var(--accent-danger); 
            font-size: 0.8rem; 
            padding: 8px 15px; 
            pointer-events: auto;
        }

        .app-label-shelly {
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.9);
            color: white; font-size: 0.65rem; padding: 2px 5px; text-align: center; pointer-events: none; z-index: 20; display: none;
        }
        #card-shelly.maximized .app-label-shelly { display: block; }
    </style>
</head>
<body onclick="iniciarAudioContext()">

<header>
    <div class="header-left">
        <div class="logos">
            <img src="leiria.png" alt="Leiria">
            <img src="logo.png" alt="Bombeiros">
        </div>
        <h2 style="margin-left: 10px; font-size: 1rem; color: var(--text-dim);">DASHBOARD OPERACIONAL - CBSL</h2>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
        <div id="silence-timer" style="color:var(--accent-radio); font-weight:bold; font-size: 0.9rem;"></div>
        <div class="clock-container">
            <span id="clock-date"></span>
            <span id="clock-time"></span>
        </div>
    </div>
</header>

<div class="dashboard-container">
    <aside class="controls-panel">
        <button class="btn-mute-all" onclick="stopAllAudios()">SILENCIAR TUDO</button>
        
        <div class="category-group">
            <span class="category-title">🚨 Operacional</span>
            <div class="inline-volume"><input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateSectionVolume('op', this.value)"><span class="volume-pct" id="txt-vol-op">50%</span></div>
            <div class="button-grid" id="grid-operacional"></div>
        </div>

        <div class="category-group">
            <span class="category-title">📞 Apoio</span>
            <div class="inline-volume"><input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateSectionVolume('ap', this.value)"><span class="volume-pct" id="txt-vol-ap">50%</span></div>
            <div class="button-grid" id="grid-apoio"></div>
        </div>

        <div class="category-group">
            <span class="category-title">📻 Rádios</span>
            <div class="inline-volume"><input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateSectionVolume('radio', this.value)"><span class="volume-pct" id="txt-vol-radio">50%</span></div>
            <div class="button-grid">
                <button class="btn-audio" id="btn-comercial" onclick="toggleRadio('comercial', 'https://stream-icy.bauermedia.pt/comercial.aac')">COMERCIAL</button>
                <button class="btn-audio" id="btn-rfm" onclick="toggleRadio('rfm', 'https://playerservices.streamtheworld.com/api/livestream-redirect/RFM_SC')">RFM</button>
            </div>
        </div>
    </aside>

    <main class="main-layout">
        <section class="top-priority-apps">
            <div class="app-card" id="card-shelly" onclick="toggleMaximize('card-shelly')">
                <button class="resize-btn">ABRIR</button>
                <div class="iframe-container">
                    <iframe src="https://control.shelly.cloud/#/dash/-1"></iframe>
                </div>
                <div class="shelly-credentials">
                    <span>Email: <strong>operadorbmlcmos@gmail.com</strong></span>
                    <span>Pass: <strong>opBMLcmos1002</strong></span>
                </div>
                <div class="app-label-shelly">SHELLY CLOUD</div>
            </div>

            <div class="notes-container">
                <div class="editor-toolbar">
                    <button id="btn-bold" onclick="execFormat('bold')">B</button>
                    <button id="btn-italic" onclick="execFormat('italic')">I</button>
                    <button id="btn-underline" onclick="execFormat('underline')">U</button>
                    <select onchange="execCmd('fontSize', this.value)">
                        <option value="3">Pequeno</option>
                        <option value="5" selected>Normal</option>
                        <option value="7">Grande</option>
                    </select>
                    <input type="color" onchange="execCmd('foreColor', this.value)">
                    <button style="background:#ef4444; color:white; margin-left:auto" onclick="confirmClearAll()">APAGAR</button>
                </div>
                <div id="editor" contenteditable="true" oninput="saveNotes()" onkeyup="checkStates()" onclick="checkStates()"></div>
                <div style="background:#1e293b; color:white; text-align:center; font-size:0.7rem; padding:2px">NOTAS OPERACIONAIS</div>
            </div>
        </section>

        <section class="minimized-apps-bar">
            <div class="app-card app-card-iconic" id="card-escala" onclick="toggleMaximize('card-escala')">
                <div class="app-icon">📅</div><div class="app-desc">ESCALA<br>DIÁRIA</div>
                <button class="resize-btn"></button>
                <iframe data-src="https://jpleiria.github.io/escala_servico/"></iframe>
            </div>
            <div class="app-card app-card-iconic" id="card-coord" onclick="toggleMaximize('card-coord')">
                <div class="app-icon">📍</div><div class="app-desc">CONVERSOR<br>COORDENADAS SIRESP</div>
                <button class="resize-btn"></button>
                <iframe data-src="https://jpleiria.github.io/conversor_coordenadas_siresp/"></iframe>
            </div>
            <div class="app-card app-card-iconic" id="card-classif" onclick="toggleMaximize('card-classif')">
                <div class="app-icon">🔢</div><div class="app-desc">CLASSIFICAÇÕES<br>OCORRÊNCIAS</div>
                <button class="resize-btn"></button>
                <iframe data-src="https://jpleiria.github.io/codigos_ocorrencias/"></iframe>
            </div>
            <div class="app-card app-card-iconic" id="card-ppi" onclick="toggleMaximize('card-ppi')">
                <div class="app-icon">🛣️</div><div class="app-desc">PPI<br>AUTOESTRADAS</div>
                <button class="resize-btn"></button>
                <iframe data-src="https://jpleiria.github.io/ppi_autoestradas/"></iframe>
            </div>
            <div class="app-card app-card-iconic" id="card-transito" onclick="toggleMaximize('card-transito')">
                <div class="app-icon">🚗</div><div class="app-desc">TRÂNSITO<br>LIVE</div>
                <button class="resize-btn"></button>
                <iframe data-src="https://jpleiria.github.io/transito_tempo_real/"></iframe>
            </div>
        </section>
    </main>
</div>

<script>
    // [A lógica do script permanece exatamente a mesma do anterior]
    const activeAudios = {};
    let sectionVolumes = { op: 0.5, ap: 0.5, radio: 0.5 };
    let lastActiveRadio = null;
    let audioCtx = null;
    let countdownInterval = null;

    const operacionais = [
        { id: 'emergencia_medica', label: 'E. Médica' }, { id: 'acidente_viacao', label: 'Acidente' },
        { id: 'incendio_urbano', label: 'I. Urbano' }, { id: 'incendio_industrial', label: 'I. Indust.' },
        { id: 'incendio_florestal', label: 'I. Flor.' }, { id: 'saída_anulada', label: 'Anulada' }, { id: 'alerta', label: 'Alerta' }
    ];

    const apoios = [
        { id: 'chefe', label: 'Chefe' }, { id: 'rendição', label: 'Rendição' },
        { id: 'logistica', label: 'Logística' }, { id: 'parque_viaturas', label: 'Parque' }, { id: 'troca_turno', label: 'Turno' }
    ];

    function init() {
        const gridOp = document.getElementById('grid-operacional');
        operacionais.forEach(item => gridOp.innerHTML += `<button class="btn-audio" id="btn-${item.id}" onclick="playAudio('${item.id}', 'op')">${item.label}</button>`);
        const gridAp = document.getElementById('grid-apoio');
        apoios.forEach(item => gridAp.innerHTML += `<button class="btn-audio" id="btn-${item.id}" onclick="playAudio('${item.id}', 'ap')">${item.label}</button>`);
        updateClock(); setInterval(updateClock, 1000); loadNotes();
    }

    function execCmd(command, value = null) { document.execCommand(command, false, value); saveNotes(); }
    function execFormat(cmd) { document.execCommand(cmd, false, null); checkStates(); saveNotes(); }
    function checkStates() {
        const states = { 'bold': 'btn-bold', 'italic': 'btn-italic', 'underline': 'btn-underline' };
        for (let cmd in states) {
            const btn = document.getElementById(states[cmd]);
            if (document.queryCommandState(cmd)) btn.classList.add('btn-active');
            else btn.classList.remove('btn-active');
        }
    }

    function toggleMaximize(cardId) {
        const card = document.getElementById(cardId);
        const iframe = card.querySelector('iframe');
        const btn = card.querySelector('.resize-btn');
        if (card.classList.contains('maximized')) {
            card.classList.remove('maximized');
            if (btn) btn.innerText = (cardId === 'card-shelly') ? 'ABRIR' : '';
        } else {
            if (iframe && iframe.hasAttribute('data-src')) {
                iframe.src = iframe.getAttribute('data-src');
                iframe.removeAttribute('data-src');
            }
            card.classList.add('maximized');
            if (btn) btn.innerText = 'FECHAR';
        }
    }

    function playAudio(id, section) {
        iniciarAudioContext();
        const btn = document.getElementById('btn-' + id);
        if (activeAudios[id]) { 
            activeAudios[id].pause(); 
            btn.classList.remove('is-playing'); 
            delete activeAudios[id]; 
            checkAndResumeRadio(); 
            return; 
        }

        if (section === 'op') {
            Object.keys(activeAudios).forEach(key => {
                if (key === 'comercial' || key === 'rfm' || apoios.find(a => a.id === key)) {
                    activeAudios[key].pause();
                    document.getElementById('btn-' + key)?.classList.remove('is-playing');
                    if (key !== 'comercial' && key !== 'rfm') delete activeAudios[key];
                }
            });
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('silence-timer').innerText = "";
        } else if (section === 'ap') {
            if (lastActiveRadio && activeAudios[lastActiveRadio.id]) {
                activeAudios[lastActiveRadio.id].pause();
            }
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('silence-timer').innerText = "";
        }

        const audio = new Audio(id + '.mp3');
        audio.volume = sectionVolumes[section];
        btn.classList.add('is-playing');
        audio.play();
        activeAudios[id] = audio;
        
        audio.onended = () => { 
            btn.classList.remove('is-playing'); 
            delete activeAudios[id]; 
            checkAndResumeRadio(); 
        };
    }

    function toggleRadio(id, url, autoResume = false) {
        iniciarAudioContext();
        const btn = document.getElementById('btn-' + id);
        const AlertasAtivos = Object.keys(activeAudios).filter(k => k !== 'comercial' && k !== 'rfm');
        if (AlertasAtivos.length > 0 && !autoResume) return;

        if (activeAudios[id] && !autoResume) {
            activeAudios[id].pause(); delete activeAudios[id]; lastActiveRadio = null;
            btn.style.background = "#334155"; btn.style.color = "white";
        } else {
            const outra = (id === 'comercial') ? 'rfm' : 'comercial';
            if (activeAudios[outra]) { activeAudios[outra].pause(); delete activeAudios[outra]; document.getElementById('btn-' + outra).style.background = "#334155"; }
            
            const radioAudio = new Audio(url);
            radioAudio.volume = sectionVolumes.radio;
            radioAudio.play().then(() => {
                activeAudios[id] = radioAudio; lastActiveRadio = {id, url};
                btn.style.background = "var(--accent-radio)"; btn.style.color = "black";
            });
        }
    }

    function checkAndResumeRadio() {
        const AlertasRestantes = Object.keys(activeAudios).filter(k => k !== 'comercial' && k !== 'rfm');
        if (AlertasRestantes.length === 0 && lastActiveRadio) {
            let timeLeft = 60;
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('silence-timer').innerText = `RÁDIO EM: ${timeLeft}s`;
            countdownInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('silence-timer').innerText = `RÁDIO EM: ${timeLeft}s`;
                if (timeLeft <= 0) { 
                    clearInterval(countdownInterval); 
                    document.getElementById('silence-timer').innerText = ""; 
                    toggleRadio(lastActiveRadio.id, lastActiveRadio.url, true); 
                }
            }, 1000);
        }
    }

    function stopAllAudios() {
        if (countdownInterval) clearInterval(countdownInterval);
        document.getElementById('silence-timer').innerText = "";
        Object.keys(activeAudios).forEach(id => { 
            activeAudios[id].pause();
            const btn = document.getElementById('btn-' + id);
            if (btn) {
                btn.classList.remove('is-playing');
                if (id === 'comercial' || id === 'rfm') { btn.style.background = "#334155"; btn.style.color = "white"; }
            }
            delete activeAudios[id];
        });
        lastActiveRadio = null;
    }

    function updateSectionVolume(section, value) {
        sectionVolumes[section] = parseFloat(value);
        document.getElementById(`txt-vol-${section}`).innerText = Math.round(value * 100) + '%';
        if(activeAudios['comercial']) activeAudios['comercial'].volume = sectionVolumes.radio;
        if(activeAudios['rfm']) activeAudios['rfm'].volume = sectionVolumes.radio;
    }

    function iniciarAudioContext() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function saveNotes() { localStorage.setItem('cbsl_notes', document.getElementById('editor').innerHTML); }
    function loadNotes() { document.getElementById('editor').innerHTML = localStorage.getItem('cbsl_notes') || ''; }
    function confirmClearAll() { if(confirm("Apagar notas?")) { document.getElementById('editor').innerHTML = ""; saveNotes(); } }

    function updateClock() {
        const agora = new Date();
        document.getElementById('clock-date').innerText = agora.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('clock-time').innerText = agora.toLocaleTimeString('pt-PT', { hour12: false });
    }

    init();
</script>
</body>
</html>
