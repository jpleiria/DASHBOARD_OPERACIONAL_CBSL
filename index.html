<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operacional - CBSL</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #3b82f6;
            --accent-radio: #facc15;
            --accent-danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 100;
            height: 55px;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 8px; }
        .logos img { height: 32px; width: auto; }
        
        .clock-container {
            display: flex;
            align-items: baseline;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 10px;
            border-radius: 6px;
            gap: 10px;
        }

        #clock-date { font-size: 0.8rem; color: var(--text-dim); text-transform: capitalize; }
        #clock-time { font-size: 1.3rem; color: #ffffff; font-weight: 800; font-family: 'Courier New', monospace; }

        .dashboard-container { 
            display: flex;
            flex-direction: column; 
            gap: 8px; 
            padding: 8px; 
            flex: 1; 
            overflow: hidden; 
        }

        /* PAINEL DE ALERTAS REDUZIDO PARA 25% */
        .controls-panel { 
            background: var(--card-bg); 
            padding: 10px; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            height: 25%; 
            overflow-y: auto;
            z-index: 10;
        }
        
        .category-group {
            background: rgba(255, 255, 255, 0.02); padding: 8px; border-radius: 8px;
            border: 1px solid #334155; margin-bottom: 4px;
        }

        .category-title { color: var(--accent-primary); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; display: block; }

        .inline-volume { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .volume-slider { flex: 1; cursor: pointer; height: 6px; accent-color: var(--accent-primary); }
        .volume-pct { font-size: 0.75rem; min-width: 35px; text-align: right; }

        .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .btn-audio { 
            background: #334155; 
            border: 1px solid #475569; 
            color: white; 
            padding: 8px 4px;
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.8rem;
            font-weight: 800;
            min-height: 55px;
            transition: all 0.2s;
            line-height: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-mute-all { width: 100%; background: var(--accent-danger); color: white; border: none; padding: 8px; border-radius: 6px; font-weight: 800; cursor: pointer; margin-bottom: 4px; }
        .is-playing { animation: pulse-alert 0.8s infinite !important; border: 2px solid white !important; }

        @keyframes pulse-alert {
            0% { background-color: var(--accent-danger); }
            50% { background-color: #b91c1c; }
            100% { background-color: var(--accent-danger); }
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* SHELLY MUITO MAIOR (4fr) E NOTAS PEQUENAS (0.6fr) */
        .top-priority-apps {
            display: grid; 
            grid-template-rows: 4fr 0.6fr; 
            gap: 8px;
            flex: 1;
        }

        #card-shelly { background: #000; position: relative; border-radius: 8px; overflow: hidden; border: 2px solid #334155; }
        #card-shelly iframe { width: 100%; height: 100%; border: none; background: white; }

        /* CREDENCIAIS SELECIONÁVEIS */
        #shelly-credentials {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid var(--accent-radio);
            z-index: 5005;
            text-align: left;
            pointer-events: auto; /* Permite selecionar o texto */
            user-select: text;    /* Garante a seleção */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #card-shelly.maximized #shelly-credentials { display: block; }

        .notes-container {
            background: #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; border: 2px solid #334155;
        }

        #editor { flex: 1; padding: 10px; background: white; color: #1e293b; overflow-y: auto; outline: none; font-size: 18px; line-height: 1.3; }

        .minimized-apps-bar { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            height: 70px; 
            flex-shrink: 0;
        }

        .app-card { 
            background: var(--card-bg); border-radius: 8px; overflow: hidden; position: relative; 
            border: 2px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }

        .app-card-iconic .app-icon { font-size: 1.2rem; }
        .app-card-iconic .app-desc { font-size: 0.55rem; font-weight: bold; text-transform: uppercase; }
        .app-card-iconic iframe { display: none; }

        .resize-btn { 
            position: absolute; top: 5px; right: 5px; background: rgba(15, 23, 42, 0.9); 
            color: white; border: 1px solid var(--accent-primary); border-radius: 4px; padding: 4px 8px; 
            cursor: pointer; font-size: 0.65rem; z-index: 50;
        }

        /* BOTÃO VOLTAR CORRIGIDO */
        .close-btn-max { 
            display: none; position: absolute; top: 15px; right: 15px; background: var(--accent-danger); 
            color: white; border: 2px solid white; border-radius: 8px; padding: 10px 20px; 
            cursor: pointer; font-size: 1rem; font-weight: 800; z-index: 6000;
        }

        .maximized { 
            position: absolute !important; 
            top: 0 !important; 
            left: 0 !important; 
            width: 100% !important; 
            height: 100% !important; 
            z-index: 5000 !important; 
            border: 3px solid var(--accent-primary) !important;
        }
        
        .maximized .close-btn-max { display: block !important; }

        .maximized iframe { 
            display: block !important; 
            width: 111.11% !important;  
            height: 111.11% !important; 
            transform: scale(0.9);    
            transform-origin: 0 0;    
        }

    </style>
</head>
<body onclick="iniciarAudioContext()">

<header>
    <div class="header-left">
        <div class="logos"><img src="logo.png" alt="Bombeiros"></div>
        <h2 style="font-size: 0.8rem; color: var(--text-dim);">CBSL - OPERACIONAL</h2>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div id="silence-timer" style="color:var(--accent-radio); font-weight:bold; font-size: 0.7rem;"></div>
        <div class="clock-container">
            <span id="clock-date"></span>
            <span id="clock-time"></span>
        </div>
    </div>
</header>

<div class="dashboard-container">
    <aside class="controls-panel">
        <button class="btn-mute-all" onclick="stopAllAudios()">SILENCIAR TUDO</button>
        
        <div class="category-group">
            <span class="category-title">🚨 Operacional</span>
            <div class="inline-volume">
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1" oninput="updateSectionVolume('op', this.value)">
                <span class="volume-pct" id="txt-vol-op">100%</span>
            </div>
            <div class="button-grid" id="grid-operacional"></div>
        </div>

        <div class="category-group">
            <span class="category-title">Apoio</span>
            <div class="inline-volume">
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1" oninput="updateSectionVolume('ap', this.value)">
                <span class="volume-pct" id="txt-vol-ap">100%</span>
            </div>
            <div class="button-grid" id="grid-apoio"></div>
        </div>
    </aside>

    <main class="main-layout">
        <section class="top-priority-apps">
            <div class="app-card" id="card-shelly">
                <button class="resize-btn" onclick="toggleMaximize('card-shelly')">ABRIR</button>
                <button class="close-btn-max" onclick="toggleMaximize('card-shelly')">VOLTAR</button>
                
                <div id="shelly-credentials">
                    <p><strong>Email:</strong> operadorbmlcmos@gmail.com</p>
                    <p><strong>Pass:</strong> opBMLcmos1002</p>
                </div>

                <iframe src="https://control.shelly.cloud/#/dash/-1"></iframe>
            </div>

            <div class="notes-container">
                <div id="editor" contenteditable="true" oninput="saveNotes()"></div>
                <div style="background:#1e293b; color:white; text-align:center; font-size:0.6rem; padding:2px">NOTAS</div>
            </div>
        </section>

        <section class="minimized-apps-bar">
            <div class="app-card app-card-iconic" id="card-escala" onclick="toggleMaximize('card-escala')">
                <button class="close-btn-max">VOLTAR</button>
                <div class="app-icon">📅</div><div class="app-desc">ESCALA</div>
                <iframe data-src="https://jpleiria.github.io/escala_servico/"></iframe>
            </div>
            <div class="app-card app-card-iconic" id="card-coord" onclick="toggleMaximize('card-coord')">
                <button class="close-btn-max">VOLTAR</button>
                <div class="app-icon">📍</div><div class="app-desc">COORD.</div>
                <iframe data-src="https://jpleiria.github.io/conversor_coordenadas_siresp/"></iframe>
            </div>
            <div class="app-card app-card-iconic" id="card-classif" onclick="toggleMaximize('card-classif')">
                <button class="close-btn-max">VOLTAR</button>
                <div class="app-icon">🔢</div><div class="app-desc">CÓDIGOS</div>
                <iframe data-src="https://jpleiria.github.io/codigos_ocorrencias/"></iframe>
            </div>
            <div class="app-card app-card-iconic" id="card-ppi" onclick="toggleMaximize('card-ppi')">
                <button class="close-btn-max">VOLTAR</button>
                <div class="app-icon">🛣️</div><div class="app-desc">PPI</div>
                <iframe data-src="https://jpleiria.github.io/ppi_autoestradas/"></iframe>
            </div>
            <div class="app-card app-card-iconic" id="card-transito" onclick="toggleMaximize('card-transito')">
                <button class="close-btn-max">VOLTAR</button>
                <div class="app-icon">🚗</div><div class="app-desc">TRANSITO</div>
                <iframe data-src="https://jpleiria.github.io/transito_tempo_real/"></iframe>
            </div>
        </section>
    </main>
</div>

<script>
    const activeAudios = {};
    let sectionVolumes = { op: 1.0, ap: 1.0 };
    let audioCtx = null;

    const operacionais = [
        { id: 'emergencia_medica', label: '*️⃣ EMERGÊNCIA' }, 
        { id: 'acidente_viacao', label: '🚧 ACIDENTE' },
        { id: 'incendio_urbano', label: '🚒 URBANO' }, 
        { id: 'incendio_florestal', label: '🔥 FLORESTAL' }, 
        { id: 'saída_anulada', label: '❌ ANULADA' }, 
        { id: 'alerta', label: '🚨 ALERTA' }
    ];

    const apoios = [
        { id: 'chefe', label: 'CHEFE À CENTRAL' }, 
        { id: 'rendição', label: 'RENDIÇÃO' },
        { id: 'logistica', label: 'LOGISTICA' }
    ];

    function init() {
        const gridOp = document.getElementById('grid-operacional');
        operacionais.forEach(item => {
            gridOp.innerHTML += `<button class="btn-audio" id="btn-${item.id}" onclick="event.stopPropagation(); playAudio('${item.id}', 'op')">${item.label}</button>`;
        });
        const gridAp = document.getElementById('grid-apoio');
        apoios.forEach(item => {
            gridAp.innerHTML += `<button class="btn-audio" id="btn-${item.id}" onclick="event.stopPropagation(); playAudio('${item.id}', 'ap')">${item.label}</button>`;
        });
        updateClock(); setInterval(updateClock, 1000); loadNotes();
    }

    function toggleMaximize(cardId) {
        const card = document.getElementById(cardId);
        const iframe = card.querySelector('iframe');
        const isMaximized = card.classList.contains('maximized');

        // Fecha todos antes de abrir um novo
        document.querySelectorAll('.app-card').forEach(c => c.classList.remove('maximized'));

        if (!isMaximized) {
            if (iframe && iframe.hasAttribute('data-src')) {
                iframe.src = iframe.getAttribute('data-src');
                iframe.removeAttribute('data-src');
            }
            card.classList.add('maximized');
        }
    }

    // Impede que o clique no texto das credenciais feche a janela
    document.getElementById('shelly-credentials').addEventListener('click', (e) => e.stopPropagation());

    function playAudio(id, section) {
        iniciarAudioContext();
        const btn = document.getElementById('btn-' + id);
        if (activeAudios[id]) { 
            activeAudios[id].pause(); 
            btn.classList.remove('is-playing'); 
            delete activeAudios[id]; 
            return; 
        }

        const audio = new Audio(id + '.mp3');
        audio.volume = sectionVolumes[section];
        btn.classList.add('is-playing');
        audio.play();
        activeAudios[id] = audio;
        audio.onended = () => { btn.classList.remove('is-playing'); delete activeAudios[id]; };
    }

    function stopAllAudios() {
        Object.keys(activeAudios).forEach(id => { 
            activeAudios[id].pause();
            document.getElementById('btn-' + id)?.classList.remove('is-playing');
            delete activeAudios[id];
        });
    }

    function updateSectionVolume(section, value) {
        sectionVolumes[section] = parseFloat(value);
        document.getElementById(`txt-vol-${section}`).innerText = Math.round(value * 100) + '%';
    }

    function iniciarAudioContext() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function saveNotes() { localStorage.setItem('cbsl_notes_v', document.getElementById('editor').innerHTML); }
    function loadNotes() { document.getElementById('editor').innerHTML = localStorage.getItem('cbsl_notes_v') || ''; }

    function updateClock() {
        const agora = new Date();
        document.getElementById('clock-date').innerText = agora.toLocaleDateString('pt-PT', { day: 'numeric', month: 'short' });
        document.getElementById('clock-time').innerText = agora.toLocaleTimeString('pt-PT', { hour12: false });
    }

    init();
</script>
</body>
</html>
